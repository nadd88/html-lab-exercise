<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
</head>

<body>

    <h2>Contact Me</h2>

    <form action="#" method="post">

    <label for="name">Name:</label>
    <input type="text" id="name" name="name"
    style="border:1px solid black; padding:5px;" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email"
    style="background-color:lightgray;" required><br><br>

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone"><br><br>

    <label for="age">Age:</label>
    <input type="number" id="age" min="18" max="60"><br><br>

    <label for="date">Date:</label>
    <input type="date" id="date"><br><br>

    <label>Satisfaction:</label>
    <input type="range" min="1" max="10"><br><br>

    <p>Gender:</p>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female<br><br>

    <p>Interests:</p>
    <input type="checkbox" name="interest" value="coding"> Coding
    <input type="checkbox" name="interest" value="design"> Design<br><br>

    <label for="subject">Subject:</label>
    <select id="subject">
    <optgroup label="General">
    <option>Question</option>
    <option>Feedback</option>
    </optgroup>
    </select><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" maxlength="200"></textarea><br><br>

    <button type="submit"
    style="color:white; background-color:black; padding:10px;">
    Submit
    </button>

    </form>

</body>
</html>
